      "@context": "https://schema.org",

      "name": "Chronos World Clock",

    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [

          "@type": "Question",
          "name": "What time is it right now?",
          "acceptedAnswer": {

        {
          "@type": "Question",
          "name": "How do I convert time zones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chronos provides instant timezone conversion between any two cities, showing time differences and DST information."
          }
        },
        {
          "@type": "Question",
          "name": "What is DST (Daylight Saving Time)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DST is the practice of setting clocks forward one hour during warmer months. Chronos tracks DST changes for all cities."
          }
        }
      ]
    }
